name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip NeonCalendarWidgetProject.zip

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x NeonCalendarWidgetProject/gradlew

      - name: Build APK
        run: cd NeonCalendarWidgetProject && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: NeonCalendarWidgetProject/app/build/outputs/apk/debug/app-debug.apk
