name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip NeonCalendarWidgetProject.zip

      - name: Show files (debug)
        run: ls -R

      - name: Find gradlew
        run: |
          DIR=$(find . -name gradlew -exec dirname {} \;)
          echo "DIR=$DIR" >> $GITHUB_ENV

      - name: Make gradlew executable
        run: chmod +x $DIR/gradlew

      - name: Build APK
        run: cd $DIR && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.DIR }}/app/build/outputs/apk/debug/app-debug.apk
